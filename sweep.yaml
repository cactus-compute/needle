method: bayes
metric:
  name: epoch/avg_loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-2
  muon_lr:
    distribution: log_uniform_values
    min: 5.0e-3
    max: 0.1
  warmup_ratio:
    distribution: uniform
    min: 0.01
    max: 0.15
  dropout:
    values: [0.0, 0.05, 0.1, 0.15, 0.2]
  batch_size:
    values: [16, 32, 64]
  d_model:
    values: [64, 128, 256]
  num_layers:
    values: [2, 3, 4]
  num_heads:
    values: [2, 4, 8]
